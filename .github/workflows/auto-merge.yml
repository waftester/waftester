name: Auto Merge

on:
  # Trigger when CI completes on a PR
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only run if CI succeeded for a pull_request event
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Find PR for this workflow run
        id: find_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          PR_DATA=$(gh pr list --repo ${{ github.repository }} --json number,headRefName,author \
            --jq ".[] | select(.headRefName == \"$BRANCH\")" 2>/dev/null || echo "")

          if [ -z "$PR_DATA" ]; then
            echo "No open PR found for branch $BRANCH"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PR_NUM=$(echo "$PR_DATA" | jq -r '.number')
          AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login')
          echo "pr=$PR_NUM" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "Found PR #$PR_NUM from $BRANCH by $AUTHOR"

      - name: Check if auto-merge eligible
        if: steps.find_pr.outputs.skip != 'true'
        id: eligible
        env:
          BRANCH: ${{ steps.find_pr.outputs.branch }}
          AUTHOR: ${{ steps.find_pr.outputs.author }}
        run: |
          # Auto-merge these PR types:
          #   - release/* and version/* branches (version bumps)
          #   - dependabot PRs
          ELIGIBLE=false
          case "$BRANCH" in
            release/*|version/*) ELIGIBLE=true ;;
          esac
          case "$AUTHOR" in
            dependabot|dependabot[bot]) ELIGIBLE=true ;;
          esac

          echo "eligible=$ELIGIBLE" >> $GITHUB_OUTPUT
          echo "Auto-merge eligible: $ELIGIBLE (branch=$BRANCH, author=$AUTHOR)"

      # Local merge + push to control the committer identity.
      # Using gh pr merge (GitHub API) stamps the committer as the token
      # owner's GitHub profile, leaking personal identity. Local git merge
      # uses git config, keeping committer as WAFtester.
      - name: Checkout repository
        if: steps.eligible.outputs.eligible == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.ADMIN_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Merge PR locally and push
        if: steps.eligible.outputs.eligible == 'true'
        env:
          PR_NUM: ${{ steps.find_pr.outputs.pr }}
          BRANCH: ${{ steps.find_pr.outputs.branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Set committer identity — this is the whole point.
          # git config controls the committer field for local operations.
          git config user.name "WAFtester"
          git config user.email "dev@waftester.com"

          # Fetch the PR branch
          git fetch origin "$BRANCH"

          # Fast-forward merge — no new commits, preserves CI status on
          # the tip commit so the push passes required status checks.
          if git merge --ff-only "origin/$BRANCH"; then
            echo "Fast-forward merge successful"
          else
            # PR branch has diverged from main. Rebase locally to create
            # new commits with the correct committer identity.
            echo "Fast-forward not possible, rebasing..."
            git rebase "origin/$BRANCH" || {
              echo "::error::Rebase failed — manual merge required for PR #$PR_NUM"
              exit 1
            }
          fi

          # Push to main. The token used in checkout handles authentication.
          # The committer field is set by git config above, not by the token.
          git push origin main

          # Close the PR (the branch was merged, but GitHub doesn't auto-detect
          # local merges) and delete the branch.
          gh pr close "$PR_NUM" --comment "Merged to main via local fast-forward (identity-safe auto-merge)." || true
          git push origin --delete "$BRANCH" 2>/dev/null || true

          echo "Merged PR #$PR_NUM ($BRANCH) via local merge + push"
