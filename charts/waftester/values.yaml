# Default values for waftester.

replicaCount: 1

image:
  repository: ghcr.io/waftester/waftester
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a ServiceAccount should be created.
  create: true
  # Annotations to add to the ServiceAccount.
  annotations: {}
  # The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""
  # Whether to automount the ServiceAccount token. Not needed by WAFtester.
  automount: false

# WAFtester MCP server configuration.
config:
  # HTTP listen address (passed as --http flag).
  httpAddr: ":8080"
  # Additional command-line arguments appended to the entrypoint.
  extraArgs: []

# Environment variables for the container.
# WAFtester uses WAF_TESTER_* prefix.
env: {}
  # WAF_TESTER_PAYLOAD_DIR: /app/payloads
  # WAF_TESTER_PRESET_DIR: /app/presets
  # WAF_TESTER_TEMPLATE_DIR: /app/templates

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: waftester.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: waftester-tls
  #    hosts:
  #      - waftester.local

resources: {}
  # requests:
  #   cpu: 100m
  #   memory: 64Mi
  # limits:
  #   cpu: 500m
  #   memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Volume for /tmp — required because rootFilesystem is read-only.
tmpDir:
  sizeLimit: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Prometheus ServiceMonitor (requires prometheus-operator CRDs).
serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}
